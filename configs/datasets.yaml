# Hurricane Isabel (13 fields, 100×500×500, f32)
# Log10 variants excluded; only the raw physical fields are benchmarked.
# Fast-to-slow: x (500) → y (500) → z (100).
HURR:
  dtype: f32
  dim_order: fast-to-slow
  root: ${BENCHKIT_DATA_ROOT}/HURR_100x500x500
  fields:
    CLOUD:  {dims: [500, 500, 100], path: CLOUDf48.bin.f32}
    P:      {dims: [500, 500, 100], path: Pf48.bin.f32}
    PRECIP: {dims: [500, 500, 100], path: PRECIPf48.bin.f32}
    QCLOUD: {dims: [500, 500, 100], path: QCLOUDf48.bin.f32}
    QGRAUP: {dims: [500, 500, 100], path: QGRAUPf48.bin.f32}
    QICE:   {dims: [500, 500, 100], path: QICEf48.bin.f32}
    QRAIN:  {dims: [500, 500, 100], path: QRAINf48.bin.f32}
    QSNOW:  {dims: [500, 500, 100], path: QSNOWf48.bin.f32}
    QVAPOR: {dims: [500, 500, 100], path: QVAPORf48.bin.f32}
    TC:     {dims: [500, 500, 100], path: TCf48.bin.f32}
    U:      {dims: [500, 500, 100], path: Uf48.bin.f32}
    V:      {dims: [500, 500, 100], path: Vf48.bin.f32}
    W:      {dims: [500, 500, 100], path: Wf48.bin.f32}

# NYX cosmology simulation (6 fields, 512×512×512, f32)
NYX:
  dtype: f32
  dim_order: fast-to-slow
  root: ${BENCHKIT_DATA_ROOT}/NYX_512x512x512
  fields:
    baryon_density:      {dims: [512, 512, 512], path: baryon_density.f32}
    dark_matter_density: {dims: [512, 512, 512], path: dark_matter_density.f32}
    temperature:         {dims: [512, 512, 512], path: temperature.f32}
    velocity_x:          {dims: [512, 512, 512], path: velocity_x.f32}
    velocity_y:          {dims: [512, 512, 512], path: velocity_y.f32}
    velocity_z:          {dims: [512, 512, 512], path: velocity_z.f32}

# Miranda turbulence simulation (7 fields, 256×384×384, f64)
# Double precision. Use configs/pipelines/fzgpu_f64.toml and cusz_f64.toml.
MIRANDA:
  dtype: f64
  dim_order: fast-to-slow
  root: ${BENCHKIT_DATA_ROOT}/MIRANDA_256x384x384
  fields:
    density:    {dims: [384, 384, 256], path: density.d64}
    diffusivity: {dims: [384, 384, 256], path: diffusivity.d64}
    pressure:   {dims: [384, 384, 256], path: pressure.d64}
    velocityx:  {dims: [384, 384, 256], path: velocityx.d64}
    velocityy:  {dims: [384, 384, 256], path: velocityy.d64}
    velocityz:  {dims: [384, 384, 256], path: velocityz.d64}
    viscocity:  {dims: [384, 384, 256], path: viscocity.d64}

# HACC N-body cosmology — medium size (6 fields, 280,953,867 particles, f32, 1-D)
HACC:
  dtype: f32
  dim_order: fast-to-slow
  root: ${BENCHKIT_DATA_ROOT}/HACCM_280953867
  fields:
    vx: {dims: [280953867], path: vx.f32}
    vy: {dims: [280953867], path: vy.f32}
    vz: {dims: [280953867], path: vz.f32}
    xx: {dims: [280953867], path: xx.f32}
    yy: {dims: [280953867], path: yy.f32}
    zz: {dims: [280953867], path: zz.f32}

# EXAALT molecular dynamics (6 fields, 2,869,440 particles, f32, 1-D)
# Files use .dat2 extension; content is raw binary float32.
EXAALT:
  dtype: f32
  dim_order: fast-to-slow
  root: ${BENCHKIT_DATA_ROOT}/EXAALT_2869440
  fields:
    vx: {dims: [2869440], path: vx.dat2}
    vy: {dims: [2869440], path: vy.dat2}
    vz: {dims: [2869440], path: vz.dat2}
    xx: {dims: [2869440], path: xx.dat2}
    yy: {dims: [2869440], path: yy.dat2}
    zz: {dims: [2869440], path: zz.dat2}

# QMCPACK quantum Monte Carlo orbitals (1 file, 288×69×69×115, f32, 4-D)
# File is in the 115x69x69x288/ subdirectory; fast-to-slow: orbital (288) is fastest.
QMCPACK:
  dtype: f32
  dim_order: fast-to-slow
  root: ${BENCHKIT_DATA_ROOT}/QMCPACK/115x69x69x288
  fields:
    einspline: {dims: [288, 69, 69, 115], path: einspline_115_69_69_288.f32}
