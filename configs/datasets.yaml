# Dataset manifest. Each top-level key is a dataset; each field gives dims + path.
# dims are fast-to-slow (matches FZGM -l fast x mid x slow). `root` is prepended to
# each field's relative `path`. ${ENV} variables are expanded at load time (config.py).
#
# Use ${BENCHKIT_DATA_ROOT} to make entries portable across machines:
#   export BENCHKIT_DATA_ROOT=/N/scratch/sruiter/sdrbench_data   (BigRed200)
# Set this in your job script, ~/.bashrc, or site.local.yaml before running.
# scripts/download-sdrbench.sh (or `benchkit download`) creates the directory layout below.
# See docs/hpc-setup.md for full machine setup instructions.

# ----- local desktop (non-HPC) -----------------------------------------------

CESM-CLDHGH-local:
  dtype: f32
  dim_order: fast-to-slow
  root: /home/skyler/research/compression/FZ_ZF/compressors/FZGPUModules/data
  fields:
    CLDHGH:
      dims: [3600, 1800]
      path: CLDHGH.f32


# ----- SDRBench datasets (portable via ${BENCHKIT_DATA_ROOT}) -----------------
# Download with:  bash scripts/download-sdrbench.sh $BENCHKIT_DATA_ROOT
# or:             python -m benchkit download $BENCHKIT_DATA_ROOT
#
# Directory layout created by the download script:
#   $BENCHKIT_DATA_ROOT/
#     CESM_1800x3600/         (79 2-D f32 fields, 1800×3600)
#     CESMATM_26x1800x3600/   (33 3-D f32 fields, 26×1800×3600)
#     HURR_100x500x500/       (13 3-D f32 fields, 100×500×500)
#     NYX_512x512x512/        (6 3-D f32 fields, 512×512×512)
#     MIRANDA_256x384x384/    (7 3-D f64 fields, 256×384×384)
#     HACCM_280953867/        (6 1-D f32 fields, 280,953,867 particles)
#     EXAALT_2869440/         (6 1-D f32 fields as .dat2, 2,869,440 particles)
#     QMCPACK/                (1 4-D f32 array, 288×69×69×115 orbitals)

