[pipeline]
# cuSZ-Hi LC back-end — throughput (tp) mode (Huffman-free).
#   predictor: GInterp (spline interpolation, cuSZ-Hi Spline path)
#   codes:    GInterp -> TCMS1 -> BIT1 -> RRE1
#   outliers: Merge([anchor | outlier_vals | outlier_idxs]) -> BIT4 -> RRE2 -> RZE1
# TCMS = Zigzag (byte-transparent), BIT = Bitshuffle, RRE = RRE, RZE = RZE.
# dims are intentionally omitted: the caller must set them (CLI -l / setDims())
# for the actual data. A dims entry here would override setDims() at loadConfig
# time (GInterp is ≥2-D), silently running the pipeline at the wrong shape.
memory_strategy = "MINIMAL"

[[stage]]
name = "gi"
type = "GInterp"
input_type = "float32"
code_type = "uint8"                # match cuSZ-Hi's spline ectrl (ErrCtrlTrait<1> = u1).
                                   # 1 byte/code, half the code-stream bytes of uint16.
error_bound = 1e-3
error_bound_mode = "NOA"
quant_radius = 128                 # match cuSZ-Hi's spline default (dict_size=256, radius=128).
                                   # Codes live in [0,256) so they fit a single byte; residuals
                                   # outside +/-128 escape to the outlier buffer (compaction),
                                   # exactly as native does. Together with uint8 codes this ~2x's
                                   # the CR vs the old uint16/r32768 config (CLDHGH 7.68->12.47x,
                                   # native 13.33x) at identical fidelity. Auto-tuning adds <0.5%.
outlier_capacity = 0.2             # radius-128 pushes more residuals to outliers than a wide
                                   # radius would; 20% capacity covers sharp fields (e.g. NYX).

# ── codes chain: TCMS1 -> BIT1 -> RRE1 ──
[[stage]]
name = "tcms"
type = "Zigzag"
input_type = "int8"
output_type = "uint8"
byte_transparent = true            # LC TCMS: zigzag the raw byte stream
inputs = [{from = "gi", port = "codes"}]

[[stage]]
name = "bit1"
type = "Bitshuffle"
element_width = 1
block_size = 16384
inputs = [{from = "tcms", port = "output"}]

[[stage]]
name = "rre1"
type = "RRE"
word_size = 1
inputs = [{from = "bit1", port = "output"}]

# ── outlier chain (BITR): Merge([anchor|outlier_vals|outlier_idxs]) -> BIT4 -> RRE2 -> RZE1 ──
[[stage]]
name = "merge"
type = "Merge"
segments = ["anchor", "outlier_vals", "outlier_idxs"]
inputs = [
  {from = "gi", port = "anchor"},
  {from = "gi", port = "outlier_vals"},
  {from = "gi", port = "outlier_idxs"},
]

[[stage]]
name = "bit4"
type = "Bitshuffle"
element_width = 4
block_size = 16384
inputs = [{from = "merge", port = "output"}]

[[stage]]
name = "rre2"
type = "RRE"
word_size = 2
inputs = [{from = "bit4", port = "output"}]

[[stage]]
name = "rze"
type = "RZE"
word_size = 1                       # LC RZE_1 (byte word size)
inputs = [{from = "rre2", port = "output"}]
