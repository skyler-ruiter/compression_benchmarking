[pipeline]
# cuSZp2 (outlier) — cuszp.toml plus per-block outlier selection
#
# Same pipeline as cuszp.toml (Quantizer(linear) → Lorenzo(block=32) →
# AdaptiveBitpack), with AdaptiveBitpack outlier_selection = true: each block may
# instead store element 0 as a raw 1..4-byte outlier and pack only the rest,
# whichever is smaller. Best on non-sparse, high-smoothness data.
# cuSZp2: Huang et al., SC'24.
#
# Usage:
#   fzgmod-cli -c examples/presets/cuszp2.toml \
#              -i data/CLDHGH.f32 -l 3600x1800 -b --report --compare data/CLDHGH.f32
memory_strategy = "PREALLOCATE"

[[stage]]
name = "quant"
type = "Quantizer"
input_type = "float32"
code_type = "uint32"
error_bound = 1e-3
error_bound_mode = "ABS"
linear_mode = true

[[stage]]
name = "lrz"
type = "Lorenzo"
data_type = "int32"
block_size = 32
inputs = [{from = "quant", port = "codes"}]

[[stage]]
name = "ab"
type = "AdaptiveBitpack"
input_type = "int32"
block_size = 32
outlier_selection = true
inputs = [{from = "lrz"}]
