[pipeline]
# Lorenzo-Quant → BitplaneRLE  (FZ-GPU-style)
#
# Fused Lorenzo predictor + quantizer followed by FZ-GPU's lossless back-end:
# a fused bitplane transpose + zero-byte run-length encoder. Faithfully
# reproduces the FZ-GPU compression pipeline.
#
# Notes
# ─────────────────────────────────────────────────────────────────────────────
# - BitplaneRLEStage has the 32x32 bitplane transpose built in, so there is NO
#   separate Bitshuffle stage in front of it (that is FZ-GPU's actual design).
# - It takes the uint16 quantizer codes directly. There are no tunable
#   parameters — the chunk layout is derived from the input length.
# - zigzag_codes = true keeps the codes small and positive (high bytes mostly
#   zero), which is exactly what the zero-byte elimination exploits. Leave it on.
# - Compared to the cuSZ preset (cusz.toml, Huffman back-end): BitplaneRLE
#   typically wins compress/decompress throughput (single fused shared-memory
#   pass, no CPU codebook build), while Huffman typically wins compression ratio
#   on skewed code distributions. See examples/cusz_huffman_vs_bitplane_rle.cpp.
#
# Usage:
#   fzgmod-cli -c examples/presets/fzgpu.toml \
#              -i data/field.f32 -l 100x500x500 -b --report
memory_strategy = "PREALLOCATE"

[[stage]]
name = "lrz"
type = "LorenzoQuant"
input_type = "float32"
code_type = "uint16"
error_bound = 1e-4
error_bound_mode = "NOA"
quant_radius = 512
outlier_capacity = 0.2
zigzag_codes = true

[[stage]]
name = "bprle"
type = "BitplaneRLE"
inputs = [{from = "lrz", port = "codes"}]
