[pipeline]
# Lorenzo-Quant → BitplaneRZE  (MINIMAL memory strategy)
#
# Same topology as fzgpu.toml but with memory_strategy = "MINIMAL".
# MINIMAL allocates compress buffers on-demand and does NOT pre-allocate
# decompress output buffers during the compress phase, so the active
# footprint during compress is roughly:
#   input (8 GB) + lrz codes uint16 (4 GB) + outlier buf (1.6 GB) + bprze out (~20 MB)
# ≈ 13.6 GB for 8 GB input, vs ~27 GB under PREALLOCATE.
# Predicted ceiling: ≥16 GB on A100-40GB (BitplaneRZE output is tiny).
memory_strategy = "MINIMAL"

[[stage]]
name = "lrz"
type = "LorenzoQuant"
input_type = "float32"
code_type = "uint16"
error_bound = 1e-4
error_bound_mode = "NOA"
quant_radius = 512
outlier_capacity = 0.2
zigzag_codes = true

[[stage]]
name = "bprze"
type = "BitplaneRZE"
inputs = [{from = "lrz", port = "codes"}]
